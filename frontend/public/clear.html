<!DOCTYPE html>
<html>
<head>
    <title>Clear Storage</title>
</head>
<body>
    <h1>LocalStorage Cleared!</h1>
    <button onclick="clearAndRedirect()">Clear & Go to Register</button>
    
    <script>
        function clearAndRedirect() {
            localStorage.clear();
            window.location.href = 'http://localhost:3000/register';
        }
        
        // Auto clear
        localStorage.clear();
        setTimeout(() => {
            window.location.href = 'http://localhost:3000/register';
        }, 1000);
    </script>
</body>
</html>
